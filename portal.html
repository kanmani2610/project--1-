<!DOCTYPE html>
<html>
<head>
  <title>Faceprep campus portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .navbar-nav .nav-link:hover {
      color: #FFD700;
    }

    #topBtn {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 30px;
      z-index: 99;
      font-size: 18px;
      border: none;
      outline: none;
      background-color: #4B0082;
      color: white;
      cursor: pointer;
      padding: 10px 15px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow" style="background-color: #4B0082;">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="portal.html">
      <img src="https://th.bing.com/th/id/OIP.-WneChs5ucOouUHOjqcBHQHaBk?r=0&rs=1&pid=ImgDetMain" alt="Faceprep Logo" style="height: 30px; margin-right: 10px;">
     Portal
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="portal.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="achievements.html">Achievements</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="memories.html">Memories</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="future.html">Letters</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="5-6 HT-1.html">Student Login</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="downloads.html">About</a>
        </li>
      </ul>
      <span id="clock" class="ms-3 text-white fw-semibold"></span>
    </div>
  </div>
</nav>

<div style="height: 80px;"></div>

<section class="text-center text-white d-flex align-items-center" style="height: 90vh; position: relative;">
  <div style="background: url('https://www.sdnbvc.edu.in/wp-content/uploads/2022/08/video-bg.jpg') no-repeat center center/cover; 
              position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"></div>

  <div style="background-color: rgba(0, 0, 0, 0.6); 
              position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;"></div>

  <div class="container" style="z-index: 3; position: relative;">
    <h1 class="display-4 fw-bold">Welcome to SDNB Vaishnav College</h1>
    <p class="lead fw-normal">Empowering Women through Education & Excellence</p>
    <a href="#" class="btn btn-warning btn-lg mt-3 shadow-lg">Apply Now</a>
  </div>
</section>

<div id="collegeCarousel" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="img4.jpg" class="d-block w-100" alt="Faceprep campus" style="height: 500px; object-fit: cover;">
    </div>
    <div class="carousel-item">
      <img src="oonam.jpg" class="d-block w-100" alt="Campus 2" style="height: 500px; object-fit: cover;">
    </div>
    <div class="carousel-item">
      <img src="img5.jpg" class="d-block w-100" alt="Campus 3" style="height: 500px; object-fit: cover;">
    </div>
  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#collegeCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#collegeCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>

<!-- Scroll to top button -->
<button onclick="topFunction()" id="topBtn" title="Go to top">↑ Top</button>

<!-- Footer with year -->
<footer class="mt-4 text-center">
  <p>© <span id="year"></span> Faceprep Portal. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- JavaScript Features -->
<script>
  // Live Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString();
  }
  setInterval(updateClock, 1000);
  updateClock();

  // Apply Now Alert
  document.querySelector('.btn-warning').addEventListener('click', function(e) {
    e.preventDefault();
    alert("Application Portal is under maintenance. Please check back soon.");
  });

  // Scroll to Top Button
  const topBtn = document.getElementById("topBtn");
  window.onscroll = function() {
    topBtn.style.display = window.scrollY > 100 ? "block" : "none";
  };
  function topFunction() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Auto Year in Footer
  document.getElementById("year").textContent = new Date().getFullYear();
</script>
</body>
</html>
