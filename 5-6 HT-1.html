<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDNB Student Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script> <!-- for eye icon -->

  <style>
    body {
      background-color: #EAD7FF;
      font-family: 'Segoe UI', sans-serif;
      padding-top: 70px;
    }

    .login-box {
      background-color: #F8F1FF;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(75, 0, 130, 0.3);
      max-width: 400px;
      width: 90%;
      margin: auto;
      text-align: center;
    }

    .login-box h3 {
      color: #4B0082;
      font-weight: bold;
    }

    .form-control {
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .btn-primary {
      background-color: #6A0DAD;
      border: none;
    }

    .btn-primary:hover {
      background-color: #4B0082;
    }

    .logo {
      width: 70px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .navbar {
      background-color: #4B0082;
    }

    .nav-link {
      color: white !important;
    }

    .nav-link:hover {
      color: #FFD700 !important;
    }

    #clock {
      color: white;
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle i {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      cursor: pointer;
      color: #6A0DAD;
    }

    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #4B0082;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-top: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .forgot {
      font-size: 0.9rem;
      margin-top: 10px;
      display: block;
      color: #6A0DAD;
      text-decoration: none;
    }

    .forgot:hover {
      color: #4B0082;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="portal.html">
      <img src="https://th.bing.com/th/id/OIP.-WneChs5ucOouUHOjqcBHQHaBk?r=0&rs=1&pid=ImgDetMain" alt="Logo" style="height: 30px; margin-right: 10px;">
      Portal
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="portal.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="achievements.html">Achievements</a></li>
        <li class="nav-item"><a class="nav-link" href="memories.html">Memories</a></li>
        <li class="nav-item"><a class="nav-link" href="future.html">Letters</a></li>
        <li class="nav-item"><a class="nav-link" href="5-6 HT-1.html">Student Login</a></li>
        <li class="nav-item"><a class="nav-link" href="downloads.html">About</a></li>
      </ul>
      <span id="clock" class="ms-3 fw-semibold"></span>
    </div>
  </div>
</nav>

<!-- Login Form -->
<div class="login-box mt-5">
  <img src="https://th.bing.com/th/id/OIP.-WneChs5ucOouUHOjqcBHQHaBk?r=0&rs=1&pid=ImgDetMain" class="logo" alt="Logo">
  <h3 class="mb-3">SDNB Vaishnav Student Login</h3>
  <input type="email" id="email" class="form-control mb-3" placeholder="Enter Email">

  <div class="password-toggle mb-3">
    <input type="password" id="password" class="form-control" placeholder="Enter Password">
    <i class="fas fa-eye" id="togglePassword"></i>
  </div>

  <a href="#" class="forgot">Forgot password?</a>
  <button class="btn btn-primary w-100 mt-3" onclick="login()">Login</button>
  <div id="loader" class="loader mt-3" style="display:none;"></div>
  <p id="result" class="mt-3 fw-bold text-center"></p>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  function login() {
    let email = document.getElementById("email").value.trim();
    let pwd = document.getElementById("password").value.trim();

    if (!email || !pwd) {
      document.getElementById("result").textContent = "Both fields are required.";
      document.getElementById("result").className = "text-warning";
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById("result").textContent = "Enter a valid email.";
      document.getElementById("result").className = "text-danger";
    } else {
      // Show success message first 💜
      document.getElementById("result").innerHTML = "<span class='text-success'>Login successful! Redirecting to SDNB Portal...</span>";
      
      // Wait for 2 seconds then open real portal 🌐
      setTimeout(function() {
        window.open("https://www.sdnbvc.com/studTrans/studlogin.asp", "_blank");
      }, 2000); // 2000 ms = 2 sec
    }
  }

  // Live Clock 💫
  function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent = now.toLocaleTimeString();
  }
  setInterval(updateClock, 1000);
  updateClock();
</script>



 

</body>
</html>
